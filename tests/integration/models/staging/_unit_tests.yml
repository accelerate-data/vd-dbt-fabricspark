unit_tests:

  - name: test_stg_customers_casts_created_at
    description: "Verify created_at is cast to date type"
    model: stg_customers
    given:
      - input: ref('seed_customers')
        rows:
          - {customer_id: 1, first_name: "Alice", last_name: "Smith", email: "a@b.com", created_at: "2024-01-15"}
          - {customer_id: 2, first_name: "Bob", last_name: "Jones", email: "b@b.com", created_at: "2024-02-20"}
    expect:
      rows:
        - {customer_id: 1, first_name: "Alice", last_name: "Smith", email: "a@b.com", created_at: "2024-01-15"}
        - {customer_id: 2, first_name: "Bob", last_name: "Jones", email: "b@b.com", created_at: "2024-02-20"}
    overrides:
      macros:
        current_timestamp: "cast('2024-06-01 00:00:00' as timestamp)"

  - name: test_stg_orders_casts_amount_to_decimal
    description: "Verify amount is cast to decimal and order_date to date"
    model: stg_orders
    given:
      - input: ref('seed_orders')
        rows:
          - {order_id: 101, customer_id: 1, order_date: "2024-06-01", amount: "150.00", status: "completed"}
          - {order_id: 102, customer_id: 2, order_date: "2024-06-02", amount: "250.50", status: "pending"}
    expect:
      rows:
        - {order_id: 101, customer_id: 1, order_date: "2024-06-01", amount: 150.00, status: "completed"}
        - {order_id: 102, customer_id: 2, order_date: "2024-06-02", amount: 250.50, status: "pending"}
    overrides:
      macros:
        current_timestamp: "cast('2024-06-01 00:00:00' as timestamp)"

  - name: test_stg_orders_preserves_all_statuses
    description: "Verify all order statuses pass through correctly"
    model: stg_orders
    given:
      - input: ref('seed_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: "2024-06-01", amount: "100", status: "completed"}
          - {order_id: 2, customer_id: 1, order_date: "2024-06-02", amount: "200", status: "pending"}
          - {order_id: 3, customer_id: 1, order_date: "2024-06-03", amount: "300", status: "cancelled"}
    expect:
      rows:
        - {order_id: 1, customer_id: 1, order_date: "2024-06-01", amount: 100.00, status: "completed"}
        - {order_id: 2, customer_id: 1, order_date: "2024-06-02", amount: 200.00, status: "pending"}
        - {order_id: 3, customer_id: 1, order_date: "2024-06-03", amount: 300.00, status: "cancelled"}
    overrides:
      macros:
        current_timestamp: "cast('2024-06-01 00:00:00' as timestamp)"
