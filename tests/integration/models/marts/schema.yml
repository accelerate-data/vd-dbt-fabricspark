version: 2

models:
  - name: mart_customer_summary
    description: "Customer summary with order stats (view)"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: total_orders
        tests:
          - not_null
      - name: total_spent
        tests:
          - not_null

  - name: mart_daily_revenue
    description: "Daily revenue aggregation (incremental)"
    config:
      elementary:
        timestamp_column: order_date
    columns:
      - name: order_date
        tests:
          - unique
          - not_null
      - name: revenue
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: order_count
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"
