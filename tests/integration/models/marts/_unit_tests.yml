unit_tests:

  - name: test_customer_summary_aggregation
    description: "Verify customer summary correctly counts orders and sums spend"
    model: mart_customer_summary
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 1, first_name: "Alice", last_name: "Smith", email: "a@b.com"}
          - {customer_id: 2, first_name: "Bob", last_name: "Jones", email: "b@b.com"}
      - input: ref('stg_orders')
        rows:
          - {order_id: 101, customer_id: 1, order_date: "2024-06-01", amount: 150.00, status: "completed"}
          - {order_id: 102, customer_id: 1, order_date: "2024-06-05", amount: 75.00, status: "pending"}
          - {order_id: 103, customer_id: 2, order_date: "2024-06-03", amount: 320.00, status: "completed"}
    expect:
      rows:
        - {customer_id: 1, first_name: "Alice", last_name: "Smith", email: "a@b.com", total_orders: 2, total_spent: 225.00, first_order_date: "2024-06-01", last_order_date: "2024-06-05"}
        - {customer_id: 2, first_name: "Bob", last_name: "Jones", email: "b@b.com", total_orders: 1, total_spent: 320.00, first_order_date: "2024-06-03", last_order_date: "2024-06-03"}

  - name: test_customer_summary_no_orders
    description: "Customer with no orders should show 0 total_orders and 0 total_spent"
    model: mart_customer_summary
    given:
      - input: ref('stg_customers')
        rows:
          - {customer_id: 99, first_name: "NoOrders", last_name: "Person", email: "no@orders.com"}
      - input: ref('stg_orders')
        rows: []
    expect:
      rows:
        - {customer_id: 99, first_name: "NoOrders", last_name: "Person", email: "no@orders.com", total_orders: 0, total_spent: 0}

  - name: test_daily_revenue_full_load
    description: "Full load aggregates revenue by date with status breakdowns"
    model: mart_daily_revenue
    given:
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: "2024-06-01", amount: 100.00, status: "completed"}
          - {order_id: 2, customer_id: 2, order_date: "2024-06-01", amount: 200.00, status: "pending"}
          - {order_id: 3, customer_id: 3, order_date: "2024-06-02", amount: 300.00, status: "completed"}
          - {order_id: 4, customer_id: 1, order_date: "2024-06-02", amount: 50.00, status: "cancelled"}
    expect:
      rows:
        - {order_date: "2024-06-01", order_count: 2, revenue: 300.00, completed_revenue: 100.00, pending_orders: 1, cancelled_orders: 0}
        - {order_date: "2024-06-02", order_count: 2, revenue: 350.00, completed_revenue: 300.00, pending_orders: 0, cancelled_orders: 1}
    overrides:
      macros:
        current_timestamp: "cast('2024-06-01 00:00:00' as timestamp)"
        is_incremental: false

  - name: test_daily_revenue_single_day
    description: "Single day with mixed statuses"
    model: mart_daily_revenue
    given:
      - input: ref('stg_orders')
        rows:
          - {order_id: 1, customer_id: 1, order_date: "2024-07-01", amount: 500.00, status: "completed"}
          - {order_id: 2, customer_id: 2, order_date: "2024-07-01", amount: 150.00, status: "completed"}
          - {order_id: 3, customer_id: 3, order_date: "2024-07-01", amount: 75.00, status: "pending"}
    expect:
      rows:
        - {order_date: "2024-07-01", order_count: 3, revenue: 725.00, completed_revenue: 650.00, pending_orders: 1, cancelled_orders: 0}
    overrides:
      macros:
        current_timestamp: "cast('2024-07-01 00:00:00' as timestamp)"
        is_incremental: false
