vd_integration_test:
  outputs:
    prod:
      type: fabricspark
      method: livy
      authentication: CLI
      endpoint: https://api.fabric.microsoft.com/v1
      workspaceid: "8f627056-801c-4a19-876a-a9b458ffb7a2"
      lakehouseid: "f84a96dd-8b41-4206-a680-9b712d2878da"
      lakehouse: "`kuruma_prod_lake`"
      workspace_name: "`vd-dbt-fabricspark-prod`"  # enables 4-part naming for cross-workspace defer
      schema: "dbo"
      reuse_session: true
      session_id_file: ./livy-session-id-integration-prod.txt
      connect_retries: 2
      connect_timeout: 500
      threads: 4
      spark_config:
        name: "integration_test"
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
    dev:
      type: fabricspark
      method: livy
      authentication: CLI
      endpoint: https://api.fabric.microsoft.com/v1
      workspaceid: "029f9998-c06d-4bb7-9863-c9952e402876"
      lakehouseid: "a4bdcfbf-d6b8-4e75-8b8e-a4f7feb7bcfd"
      lakehouse: "`kuruma_dev_lake`"
      schema: "dbo"
      reuse_session: true
      session_id_file: ./livy-session-id-integration-dev.txt
      connect_retries: 2
      connect_timeout: 500
      threads: 4
      spark_config:
        name: "integration_test"
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
  target: dev
