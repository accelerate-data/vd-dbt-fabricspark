name: vd_dbt_fabricspark_integration
version: "1.0.0"
config-version: 2

profile: vd_integration_test

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

dispatch:
  - macro_namespace: elementary
    search_order:
      - vd_dbt_fabricspark_integration
      - elementary_fabricspark
      - elementary

seeds:
  vd_dbt_fabricspark_integration:
    +schema: dbo

models:
  vd_dbt_fabricspark_integration:
    staging:
      +materialized: table
      +schema: dbo
    marts:
      +schema: dbo
  elementary:
    +schema: elementary
